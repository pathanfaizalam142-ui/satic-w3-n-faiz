<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Day 3 Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<!-- Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
    <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">DATAFLOW</h2>

        <ul class="menu">
            <li>Dashboard</li>
            <li>Analytics</li>
            <li>Users</li>
            <li>Settings</li>
        </ul>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- HEADER -->
        <header class="header">
            <button class="menu-toggle" oneclick="toggleMenu()"></button>
            <input type="text" placeholder="Search..." class="search">

            <div class="profile">
                <img src="img/faiz.jpg" alt="">
                <span>Faiz</span>
            </div>
        </header>

<div class="d3-main">

    <h2 class="d3-heading">Top 10 Revenue Contributors</h2>

    <div class="d3-card">
        <canvas id="d3Chart"></canvas>
    </div>

</div>

<script src="javascript/script.js"></script>

</body>
</html>
