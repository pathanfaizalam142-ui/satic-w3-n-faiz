<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SaaS Dashboard</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app-container">

<!-- Sidebar -->

<aside class="sidebar">

<h2 class="logo">SaaS</h2>

<nav>

<ul>

<li>Dashboard</li>
<li>Analytics</li>
<li>Users</li>
<li>Revenue</li>
<li>Settings</li>

</ul>

</nav>

</aside>

<!-- Main Area -->

<div class="main">

<!-- Header -->

<header class="header">

<input type="text" placeholder="Search...">

<div class="profile">
    <img src="img/faiz.jpg"
<span>Faiz</span>

</div>

</header>

<!-- Content -->

<main class="content">

<h1>Dashboard Overview</h1>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<p>12,540</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p>$45,000</p>
</div>

<div class="card">
<h3>Sessions</h3>
<p>8,210</p>
</div>

<div class="card">
<h3>Conversion</h3>
<p>4.8%</p>
</div>

</div>

<canvas id="chart"></canvas>

</main>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="javascript/script.js"></script>

</body>
</html>
