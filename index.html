<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Day 3 Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<!-- Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
    <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">DATAFLOW</h2>

        <ul class="menu">
            <li>Dashboard</li>
            <li>Analytics</li>
            <li>Users</li>
            <li>Settings</li>
        </ul>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- HEADER -->
        <header class="header">
            <input type="text" placeholder="Search..." class="search">
            <div class="profile">
                <img src="img/faiz.jpg" alt="">
                <span>Faiz</span>
            </div>
        </header>
        <div class="d4-container">

    <h2 class="d4-title">User Revenue Table</h2>

    <div class="d4-table-wrapper">

        <table class="d4-table">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Revenue</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="d4-table-body">
                <!-- JS se data aayega -->
            </tbody>

        </table>

    </div>

</div>

<div class="d3-main">

    <h2 class="d3-heading">Top 10 Revenue Contributors</h2>

    <div class="d3-card">
        <canvas id="d3Chart"></canvas>
    </div>

</div>
<section class="day5-wrapper">

  <button id="d5-theme-btn">Toggle Theme</button>

  <select id="d5-filter">
    <option value="all">All</option>
    <option value="active">Active</option>
    <option value="inactive">Inactive</option>
  </select>

  <table border="1" width="100%" id="d5-table">
    <thead>
      <tr>
        <th>NO</th>
        <th>Name</th>
        <th>Status</th>
        <th>Revenue</th>
      </tr>
    </thead>
    <tbody id="d5-body"></tbody>
  </table>

</section>


<script src="javascript/script.js"></script>

</body>
</html>
